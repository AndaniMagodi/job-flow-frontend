<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body { width: 320px; background: #0f0f0f; color: #fff; padding: 16px; }

    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #6366f1; }
    .brand { font-size: 14px; font-weight: 600; }

    .field { margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 10px; font-size: 13px; color: #fff; outline: none; }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #444; }

    .source-badge { display: inline-flex; align-items: center; gap: 4px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #888; margin-bottom: 14px; }

    .btn { width: 100%; background: #6366f1; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 500; color: #fff; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error { font-size: 12px; color: #f87171; background: #1a0a0a; border: 1px solid #3a1a1a; border-radius: 6px; padding: 8px 10px; margin-bottom: 12px; }
    .success { font-size: 12px; color: #34d399; background: #0a1a14; border: 1px solid #0d3a28; border-radius: 6px; padding: 8px 10px; margin-bottom: 12px; text-align: center; }

    .not-logged-in { text-align: center; padding: 20px 0; }
    .not-logged-in p { font-size: 13px; color: #666; margin-bottom: 12px; }
    .not-logged-in a { color: #6366f1; font-size: 13px; }

    .loading { text-align: center; padding: 20px 0; color: #555; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <span class="brand">JobFlow</span>
  </div>

  <div id="loading" class="loading">Reading page...</div>
  <div id="not-logged-in" class="not-logged-in" style="display:none">
    <p>Sign in to JobFlow to log applications.</p>
    <a href="http://localhost:5173/login" target="_blank">Open JobFlow</a>
  </div>
  <div id="main" style="display:none">
    <div id="source-badge" class="source-badge" style="display:none"></div>
    <div id="error" class="error" style="display:none"></div>
    <div id="success" class="success" style="display:none">Application saved!</div>

    <div class="field">
      <label>Company</label>
      <input id="company" type="text" placeholder="Company name" />
    </div>
    <div class="field">
      <label>Role</label>
      <input id="role" type="text" placeholder="Job title" />
    </div>
    <div class="field">
      <label>Date applied</label>
      <input id="date" type="date" />
    </div>

    <button class="btn" id="save-btn">Save application</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
